<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="./script.js"></script>
    <title>Айзатуллина</title>
  </head>
  <body>
    <header class="container">
      <div class="xbox">
        <img src="./image/xbox.png" alt="" />
        <nav>
          <ul>
            <li>Games</li>
            <li>Consoles</li>
            <li>Community</li>
            <li><input type="text" name="" id="" placeholder="Search" /></li>
            <li>
              <img src="./image/user.png" alt="" />

            </li>
          </ul>
        </nav>
      </div>
    </header>
    <main>
      <section class="hero">
        <div class="container">
          <div class="content">
            <div class="top">
              <p>Star Wars</p>
              <span>Battlefront II</span>
            </div>
            <div class="bottom">
              <button>Watch Trailer</button>
              <button class="grey">Explore Games</button>
            </div>
          </div>
        </div>
      </section>
      <section class="two">
        <div class="container content-two">
          <div class="top">
            <img src="./image/xbox_icon.png" alt="" />
            <h2>The best value</h2>
            <h3>in games and enterta</h3>
          </div>
          <div class="cards">
            <div class="card">
              <img src="./image/2-1.png" alt="" />
              <div class="text">
                <h3>XBOX ONE X</h3>
                <p>Faster Processing<br />Smoother Gameplay</p>
                <button>Explore Consolec & Accessories</button>
              </div>
            </div>
            <div class="card">
              <img src="./image/2-2.png" alt="" />
              <div class="text">
                <h3>mixer Streaming</h3>
                <p>The Next Generation<br />Of Life Game Streaming</p>
                <button>Start Watching mixer</button>
              </div>
            </div>
            <div class="card">
              <img src="./image/2-3.png" alt="" />
              <div class="text">
                <h3>Free Games Every Month</h3>
                <p>Faster Processing<br />Smoother Gameplay</p>
                <button>Explore Consolec & Accessories</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer></footer>
  </body>
</html>
